<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Silver/white palette -->
    <linearGradient id="silverShimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:0.95"/>
      <stop offset="40%" style="stop-color:#e2e8f0;stop-opacity:0.85"/>
      <stop offset="70%" style="stop-color:#cbd5e1;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#94a3b8;stop-opacity:0.5"/>
    </linearGradient>
    
    <linearGradient id="serverBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:0.95"/>
      <stop offset="50%" style="stop-color:#475569;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#334155;stop-opacity:0.98"/>
    </linearGradient>
    
    <linearGradient id="serverFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#cbd5e1;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#94a3b8;stop-opacity:0.85"/>
    </linearGradient>
    
    <radialGradient id="silverGlow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" style="stop-color:#f1f5f9;stop-opacity:0.45"/>
      <stop offset="60%" style="stop-color:#cbd5e1;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:0"/>
    </radialGradient>
    
    <!-- LED glow -->
    <radialGradient id="ledGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#22c55e;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Dark background -->
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    
    <!-- Particle fade mask -->
    <linearGradient id="particleFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:1"/>
      <stop offset="45%" style="stop-color:white;stop-opacity:0.7"/>
      <stop offset="70%" style="stop-color:white;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:white;stop-opacity:0"/>
    </linearGradient>
    
    <mask id="serverFade">
      <rect x="100" y="80" width="312" height="320" fill="url(#particleFade)"/>
    </mask>
  </defs>
  
  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#darkBg)"/>
  
  <!-- Subtle glow -->
  <ellipse cx="256" cy="195" rx="140" ry="100" fill="url(#silverGlow)"/>
  
  <!-- Server stack with fade mask -->
  <g mask="url(#serverFade)">
    <!-- Server unit 1 (top) -->
    <g transform="translate(0, 0)">
      <rect x="140" y="120" width="232" height="55" rx="6" fill="url(#serverBody)"/>
      <rect x="145" y="125" width="222" height="45" rx="4" fill="url(#serverFace)"/>
      <!-- Vents -->
      <g fill="#64748b" opacity="0.5">
        <rect x="160" y="138" width="30" height="3" rx="1"/>
        <rect x="160" y="145" width="30" height="3" rx="1"/>
        <rect x="160" y="152" width="30" height="3" rx="1"/>
      </g>
      <!-- Drive bays -->
      <rect x="210" y="132" width="18" height="32" rx="2" fill="#475569" opacity="0.7"/>
      <rect x="232" y="132" width="18" height="32" rx="2" fill="#475569" opacity="0.7"/>
      <rect x="254" y="132" width="18" height="32" rx="2" fill="#475569" opacity="0.7"/>
      <!-- LEDs -->
      <circle cx="340" cy="140" r="4" fill="url(#ledGlow)"/>
      <circle cx="340" cy="155" r="4" fill="#475569" opacity="0.6"/>
    </g>
    
    <!-- Server unit 2 (middle) -->
    <g transform="translate(0, 65)">
      <rect x="140" y="120" width="232" height="55" rx="6" fill="url(#serverBody)"/>
      <rect x="145" y="125" width="222" height="45" rx="4" fill="url(#serverFace)"/>
      <g fill="#64748b" opacity="0.5">
        <rect x="160" y="138" width="30" height="3" rx="1"/>
        <rect x="160" y="145" width="30" height="3" rx="1"/>
        <rect x="160" y="152" width="30" height="3" rx="1"/>
      </g>
      <rect x="210" y="132" width="18" height="32" rx="2" fill="#475569" opacity="0.7"/>
      <rect x="232" y="132" width="18" height="32" rx="2" fill="#475569" opacity="0.7"/>
      <rect x="254" y="132" width="18" height="32" rx="2" fill="#475569" opacity="0.7"/>
      <circle cx="340" cy="140" r="4" fill="url(#ledGlow)"/>
      <circle cx="340" cy="155" r="4" fill="url(#ledGlow)"/>
    </g>
    
    <!-- Server unit 3 (bottom) -->
    <g transform="translate(0, 130)">
      <rect x="140" y="120" width="232" height="55" rx="6" fill="url(#serverBody)"/>
      <rect x="145" y="125" width="222" height="45" rx="4" fill="url(#serverFace)"/>
      <g fill="#64748b" opacity="0.5">
        <rect x="160" y="138" width="30" height="3" rx="1"/>
        <rect x="160" y="145" width="30" height="3" rx="1"/>
        <rect x="160" y="152" width="30" height="3" rx="1"/>
      </g>
      <rect x="210" y="132" width="18" height="32" rx="2" fill="#475569" opacity="0.7"/>
      <rect x="232" y="132" width="18" height="32" rx="2" fill="#475569" opacity="0.7"/>
      <rect x="254" y="132" width="18" height="32" rx="2" fill="#475569" opacity="0.7"/>
      <circle cx="340" cy="140" r="4" fill="url(#ledGlow)"/>
      <circle cx="340" cy="155" r="4" fill="#475569" opacity="0.6"/>
    </g>
  </g>
  
  <!-- Dissolving particles -->
  <g>
    <!-- Row 1 -->
    <rect x="152" y="340" width="9" height="9" rx="1.5" fill="#e2e8f0" opacity="0.72"/>
    <rect x="185" y="348" width="7" height="7" rx="1" fill="#cbd5e1" opacity="0.68"/>
    <rect x="218" y="338" width="8" height="8" rx="1.5" fill="#e2e8f0" opacity="0.7"/>
    <rect x="252" y="345" width="10" height="10" rx="1.5" fill="#f1f5f9" opacity="0.74"/>
    <rect x="292" y="340" width="7" height="7" rx="1" fill="#cbd5e1" opacity="0.66"/>
    <rect x="325" y="350" width="9" height="9" rx="1.5" fill="#e2e8f0" opacity="0.6"/>
    <rect x="360" y="342" width="6" height="6" rx="1" fill="#cbd5e1" opacity="0.54"/>
    
    <!-- Row 2 -->
    <rect x="145" y="372" width="6" height="6" rx="1" fill="#94a3b8" opacity="0.5"/>
    <rect x="178" y="380" width="7" height="7" rx="1" fill="#cbd5e1" opacity="0.45"/>
    <rect x="212" y="375" width="5" height="5" rx="1" fill="#94a3b8" opacity="0.48"/>
    <rect x="248" y="382" width="8" height="8" rx="1" fill="#e2e8f0" opacity="0.48"/>
    <rect x="285" y="370" width="6" height="6" rx="1" fill="#cbd5e1" opacity="0.42"/>
    <rect x="320" y="378" width="7" height="7" rx="1" fill="#94a3b8" opacity="0.38"/>
    <rect x="355" y="374" width="5" height="5" rx="1" fill="#cbd5e1" opacity="0.32"/>
    
    <!-- Row 3 -->
    <rect x="162" y="405" width="4" height="4" rx="1" fill="#64748b" opacity="0.35"/>
    <rect x="198" y="412" width="5" height="5" rx="1" fill="#94a3b8" opacity="0.3"/>
    <rect x="235" y="408" width="4" height="4" rx="1" fill="#64748b" opacity="0.32"/>
    <rect x="272" y="415" width="6" height="6" rx="1" fill="#94a3b8" opacity="0.28"/>
    <rect x="310" y="402" width="4" height="4" rx="1" fill="#64748b" opacity="0.24"/>
    <rect x="345" y="410" width="5" height="5" rx="1" fill="#94a3b8" opacity="0.2"/>
    
    <!-- Row 4 -->
    <rect x="180" y="435" width="3" height="3" rx="1" fill="#475569" opacity="0.18"/>
    <rect x="222" y="440" width="4" height="4" rx="1" fill="#64748b" opacity="0.15"/>
    <rect x="262" y="436" width="3" height="3" rx="1" fill="#475569" opacity="0.12"/>
    <rect x="302" y="442" width="4" height="4" rx="1" fill="#64748b" opacity="0.1"/>
    <rect x="338" y="438" width="3" height="3" rx="1" fill="#475569" opacity="0.08"/>
  </g>
  
</svg>
